# Publishes Python packages to PyPI via Trusted Publishing (OIDC).
# Canonical policy: repos/docs/governance/publishing_guide.md
# No PYPI_API_TOKEN secret is stored; pypa/gh-action-pypi-publish handles
# the OIDC exchange internally when no password is provided.
#
# USER ACTION REQUIRED (one-time, per package):
#   1. Register this repo + workflow filename (`release.yml`) + environment
#      (`release`) on pypi.org under Account -> Publishing -> Add pending
#      publisher. See publishing_guide.md section 4.2.

name: release-python

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write   # required for OIDC token exchange
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    strategy:
      matrix:
        package:
          - python/pheno-resilience
          # Register then add:
          #   - python/pheno-deploy
          #   - python/ci-cd-kit
          #   - python/deploy-kit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build distribution
        working-directory: ${{ matrix.package }}
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.package }}/dist

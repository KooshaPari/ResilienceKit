version: "3"

vars:
  ACTIVE_LANGS:
    sh: |
      langs=""
      if [ -f rust/Cargo.toml ]; then
        langs="$langs rust"
      fi
      if { [ -d python ] && find python -mindepth 2 -maxdepth 2 -name pyproject.toml -print -quit | grep -q .; } || [ -d tests ]; then
        langs="$langs python"
      fi
      if [ -d go ] && find go -name '*.go' -print -quit | grep -q .; then
        langs="$langs go"
      fi
      printf "%s" "${langs# }"

tasks:
  default:
    cmds:
      - task: build

  detect:
    desc: Detect the active languages used by this repository
    cmds:
      - |
        set -euo pipefail
        langs="{{.ACTIVE_LANGS}}"
        if [ -z "$langs" ]; then
          echo "unknown"
        else
          echo "$langs"
        fi

  build:
    desc: Build the detected language workspaces
    cmds:
      - |
        set -euo pipefail
        langs="{{.ACTIVE_LANGS}}"
        if [ -z "$langs" ]; then
          echo "No supported language manifests found" >&2
          exit 1
        fi
        for lang in $langs; do
          case "$lang" in
            rust)
              (cd rust && cargo build --workspace)
              ;;
            python)
              for pyproject in python/*/pyproject.toml; do
                [ -f "$pyproject" ] || continue
                dir=$(dirname "$pyproject")
                (cd "$dir" && uv build)
              done
              ;;
            go)
              (cd go && go build ./...)
              ;;
          esac
        done

  test:
    desc: Run the detected language test suites
    cmds:
      - |
        set -euo pipefail
        langs="{{.ACTIVE_LANGS}}"
        if [ -z "$langs" ]; then
          echo "No supported language manifests found" >&2
          exit 1
        fi
        for lang in $langs; do
          case "$lang" in
            rust)
              (cd rust && cargo test --workspace)
              ;;
            python)
              if [ -d tests ]; then
                uvx pytest tests
              fi
              for pyproject in python/*/pyproject.toml; do
                [ -f "$pyproject" ] || continue
                dir=$(dirname "$pyproject")
                if find "$dir" -maxdepth 2 -type f \( -name 'test_*.py' -o -name '*_test.py' \) -print -quit | grep -q .; then
                  (cd "$dir" && uv run pytest)
                fi
              done
              ;;
            go)
              (cd go && go test ./...)
              ;;
          esac
        done

  lint:
    desc: Run the detected language linters
    cmds:
      - |
        set -euo pipefail
        langs="{{.ACTIVE_LANGS}}"
        if [ -z "$langs" ]; then
          echo "No supported language manifests found" >&2
          exit 1
        fi
        for lang in $langs; do
          case "$lang" in
            rust)
              (cd rust && cargo clippy --workspace --all-targets --all-features -- -D warnings)
              ;;
            python)
              if [ -d tests ]; then
                uvx ruff check tests
              fi
              for pyproject in python/*/pyproject.toml; do
                [ -f "$pyproject" ] || continue
                dir=$(dirname "$pyproject")
                (cd "$dir" && uvx ruff check .)
              done
              ;;
            go)
              (cd go && go vet ./...)
              ;;
          esac
        done

  clean:
    desc: Clean build artifacts for the detected language workspaces
    cmds:
      - |
        set -euo pipefail
        langs="{{.ACTIVE_LANGS}}"
        if [ -z "$langs" ]; then
          echo "No supported language manifests found" >&2
          exit 1
        fi
        for lang in $langs; do
          case "$lang" in
            rust)
              (cd rust && cargo clean --workspace)
              rm -rf rust/target
              ;;
            python)
              find python -type d \( -name .venv -o -name build -o -name dist -o -name .pytest_cache -o -name .ruff_cache -o -name .mypy_cache -o -name __pycache__ -o -name .eggs \) -prune -exec rm -rf {} +
              find python -type d -name '*.egg-info' -prune -exec rm -rf {} +
              ;;
            go)
              (cd go && go clean -cache -testcache)
              ;;
          esac
        done
        rm -rf .pytest_cache .ruff_cache
        git clean -fdX tests
